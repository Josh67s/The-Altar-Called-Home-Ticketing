<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>

</title>

<link
href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="css/ticket-template.css">

</head>

<body>

<div class="ticket">

<div class="left">

<div class="brand">

AMAZING CREW TV PRODUCTION

</div>

<div>

4:00 PM

</p>

</div>

<label>

<p>

Assemblies of God Church

Umudibia Nekede

Owerri

<div
id="ticketQR"

</div>
