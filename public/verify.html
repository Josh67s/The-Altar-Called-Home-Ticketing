<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>The Altar Called Home | Ticket Verification</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="css/verify.css">

</head>

<body>

<div class="page">

    <div class="scanner-card">

    <h2>📷 Scan Ticket QR Code</h2>

    <div id="reader"></div>

</div>

    <div class="search-panel">

        <input
        id="ticketSearch"
        type="text"
        placeholder="Search Order ID, Ticket Number, Name or Phone">

        <button id="searchBtn">

            🔍 Search

        </button>

    </div>

    <div class="verify-card"

         id="verificationCard">

        <div class="loading">

            <div class="spinner"></div>

            <h2>

                Waiting...

            </h2>

            <p>

                Scan a QR Code or Search for a Ticket

            </p>

        </div>

    </div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script type="module" src="js/verify.js"></script>

</body>

</html>
