<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

TACH Staff Login

</title>

<link rel="stylesheet"
href="css/login.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <img
        src="images/logo.png"
        class="logo">

        <h1>

            THE ALTAR CALLED HOME

        </h1>

        <p>

            Staff Portal

        </p>

        <form id="loginForm">

            <label>

                Email

            </label>

            <input
            type="email"
            id="email"
            required>

            <label>

    Password

</label>

<div class="password-wrapper">

<input
type="password"
id="password"
required>

<span
id="togglePassword"
class="toggle-password">

👁

</span>

</div>

            <button type="submit" id="loginBtn">

<span id="loginText">

Login

</span>

<span id="loginSpinner" class="spinner hidden"></span>

</button>

        </form>

        <div id="loginMessage"></div>

    </div>

</div>

<script
type="module"
src="js/login.js">

</script>

</body>

</html>
