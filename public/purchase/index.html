<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Purchase Ticket</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="wizard">

    <div class="progress">

        <div class="step active">1</div>
        <div class="line"></div>

        <div class="step">2</div>
        <div class="line"></div>

        <div class="step">3</div>
        <div class="line"></div>

        <div class="step">4</div>
        <div class="line"></div>

        <div class="step">5</div>

    </div>

    <div class="content">

        <h1>Choose Your Ticket</h1>

        <p>

            Select the ticket category
            you would like to purchase.

        </p>

        <div class="ticket-options">

            <button>Regular ₦1,000</button>

            <button>Standard ₦2,000</button>

            <button>Premium ₦5,000</button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
